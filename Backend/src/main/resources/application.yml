spring:
  application:
    name: subscriptions-backend

  datasource:
    url: jdbc:mysql://localhost:3306/subscription_db?serverTimezone=Asia/Kolkata&useSSL=false&allowPublicKeyRetrieval=true
    username: postgres
    password: postgres
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
     
      ddl-auto: validate  
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: Asia/Kolkata

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true 
    locations: classpath:db/migration
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

# ADD THIS: To see exactly why Flyway is skipping your files
logging:
  level:
    org.flywaydb: DEBUG

jwt:
  
  secret: "mysecretkey123456_must_be_at_least_32_characters_long"
  expiration: 36000000
